name: Deploy Single Site
on:
  workflow_dispatch:
    inputs:
      site_id:
        description: 'Site ID (z.B. trattoria-bella-vista)'
        required: true
        type: string
      deploy_target:
        description: 'Deployment Ziel'
        required: true
        default: 'github-pages'
        type: choice
        options:
          - github-pages
          - netlify
          - vercel

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm ci

      - name: Build Site
        run: |
          cd clients/${{ inputs.site_id }}
          npm install
          npx astro build

      - name: Deploy to GitHub Pages
        if: ${{ inputs.deploy_target == 'github-pages' }}
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GH_TOKEN }}
          publish_dir: ./clients/${{ inputs.site_id }}/dist
          destination_dir: ${{ inputs.site_id }}

      - name: Deploy to Netlify
        if: ${{ inputs.deploy_target == 'netlify' }}
        run: |
          npm install -g netlify-cli
          netlify deploy --prod --dir=clients/${{ inputs.site_id }}/dist --site=${{ secrets.NETLIFY_SITE_ID }}
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}

      - name: Deploy to Vercel
        if: ${{ inputs.deploy_target == 'vercel' }}
        run: |
          npm install -g vercel
          vercel --prod --yes --cwd clients/${{ inputs.site_id }}/dist
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

      - name: Lighthouse CI
        run: |
          npm install -g @lhci/cli
          lhci autorun --collect.url=https://unplug-netizen.github.io/hermes-sites/${{ inputs.site_id }}/
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}

      - name: Notify Success
        run: |
          echo "✅ Site deployed: https://unplug-netizen.github.io/hermes-sites/${{ inputs.site_id }}/"
