name: Monitor

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: pip install requests
      
      - name: Run monitoring
        run: python scripts/monitor.py --all
      
      - name: Commit reports
        run: |
          git config user.name "Hermes Bot"
          git config user.email "bot@hermes-agent.dev"
          git add reports/ data/metrics.json
          git diff --cached --quiet || git commit -m "monitor: Lighthouse $(date +%Y-%m-%d-%H:%M)"
          git push
