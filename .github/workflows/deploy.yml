name: Deploy

on:
  push:
    branches: [main]
    paths:
      - 'clients/**'
      - 'docs/**'
      - 'data/**'
      - 'scripts/**'
      - 'index.html'
      - 'payments/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Build site index
        run: python scripts/deploy.py --github-pages
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/
      
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
